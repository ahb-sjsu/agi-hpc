# ────────────────────────────────────────────────────────────────
# halyard.caddy.conf
#
# Site block for halyard.atlas-sjsu.duckdns.org — the Halyard
# Table public origin. Designed to be imported by the existing
# atlas-caddy Caddyfile so it runs under the same Caddy process
# that already serves atlas-sjsu.duckdns.org.
#
# Install:
#   cp infra/local/halyard-caddy/halyard.caddy.conf /home/claude/halyard.caddy.conf
#   # In /home/claude/Caddyfile, add this line at the top level
#   # (outside any existing site block):
#   #     import /home/claude/halyard.caddy.conf
#   sudo systemctl reload atlas-caddy
# ────────────────────────────────────────────────────────────────

halyard.atlas-sjsu.duckdns.org {
	encode gzip zstd

	# LiveKit signaling (WebSocket upgrade happens automatically)
	# plus the Twirp admin API. Both ride the same upstream.
	reverse_proxy /rtc/* 127.0.0.1:7880 {
		transport http {
			versions 1.1
		}
		flush_interval -1
	}
	reverse_proxy /twirp/* 127.0.0.1:7880

	# halyard-keeper — strip the /keeper prefix so upstream routes
	# stay as /api/livekit/token, /api/sessions, etc.
	handle_path /keeper/* {
		reverse_proxy 127.0.0.1:8091
	}

	# halyard-state — REST + WebSocket. Same prefix-strip pattern.
	handle_path /state/* {
		reverse_proxy 127.0.0.1:8090 {
			transport http {
				versions 1.1
			}
			flush_interval -1
		}
	}

	# Static art served from /archive/halyard/art/. Used for wiki
	# entry illustrations rendered by scripts/halyard/art_render.py
	# and the SVG generators. No directory listing — files are
	# referenced from wiki entries by known filename.
	handle_path /art/* {
		root * /archive/halyard/art
		file_server browse
	}

	# halyard-web — Next.js bundle at :3030 (port 3000 taken by a
	# security-radar Express target app).
	reverse_proxy 127.0.0.1:3030

	header {
		Strict-Transport-Security "max-age=31536000; includeSubDomains"
		X-Content-Type-Options "nosniff"
		Referrer-Policy "strict-origin-when-cross-origin"
		-Server
	}

	# No file logger here — atlas-caddy's default JSON stderr →
	# journalctl -u atlas-caddy captures everything. Avoids the
	# permission issue with /var/log/caddy.
}
