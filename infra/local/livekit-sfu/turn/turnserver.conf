# ────────────────────────────────────────────────────────────────
# coturn configuration — Halyard Table TURN server
#
# Reference: https://github.com/coturn/coturn/blob/master/docker/coturn/README.md
#
# Authentication model: long-term-credential with a shared secret,
# compatible with LiveKit's TURN auth generation. The shared
# secret is injected from the env (TURN_SHARED_SECRET) rather
# than being baked into this file.
# ────────────────────────────────────────────────────────────────

# STUN/TURN listening ports.
listening-port=3478
tls-listening-port=5349

# Relay port range. Kept disjoint from LiveKit's media range
# (50000-60000) so we don't fight over ports on host-network.
min-port=60001
max-port=61000

# Authenticate via long-term shared secret. Matches LiveKit's
# built-in TURN auth flow — browsers present a time-limited
# username/password derived from the shared secret.
use-auth-secret=yes
# static-auth-secret is substituted at startup from TURN_SHARED_SECRET.
static-auth-secret=${TURN_SHARED_SECRET}

# Realm for the TURN REST API credentials. Must match what the
# client-side token-minting code claims.
realm=halyard.atlas-sjsu.duckdns.org

# External IP hint — same as the LiveKit SFU. coturn can run on
# the same host (network_mode: host) and share the public address.
external-ip=${TURN_EXTERNAL_IP}

# Limit bandwidth per session to a sane ceiling — 1000 kbps is
# enough for a single-speaker video + screen share at the table.
# Adjust up if recording quality becomes an issue.
user-quota=12
total-quota=120
bps-capacity=0

# Deny relays to private / local addresses — a coturn running on
# a shared host should not be proxying connections to internal
# resources. The Halyard Table has no business reaching Atlas's
# internal services via TURN.
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=fc00::-fdff:ffff:ffff:ffff:ffff:ffff:ffff:ffff
denied-peer-ip=fe80::-febf:ffff:ffff:ffff:ffff:ffff:ffff:ffff

# Logging — to stdout so `journalctl --user -u livekit-sfu`
# captures it alongside the SFU's own logs.
no-stdout-log=false
log-file=stdout
verbose
