name: Atlas AI — CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/ --select F --ignore F401 --extend-exclude "*/__init__.py"

      - name: Format check (black)
        run: black --check src/ tests/

      - name: Unit tests
        run: pytest tests/unit/ -v --tb=short -q --ignore=tests/unit/test_safety_proto.py --ignore=tests/unit/test_erisml_proto.py -k "not proto"

  deploy:
    name: Deploy to Atlas
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install SSH client
        run: sudo apt-get install -y sshpass

      - name: Deploy to Atlas
        env:
          ATLAS_HOST: ${{ secrets.ATLAS_HOST }}
          ATLAS_USER: ${{ secrets.ATLAS_USER }}
          ATLAS_PASSWORD: ${{ secrets.ATLAS_PASSWORD }}
          DEPLOY_PATH: /home/claude/agi-hpc
        run: |
          # SSH options: skip host key check (Tailscale IP is stable)
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

          echo "=== Deploying to Atlas ==="

          # Step 1: Pull latest code on Atlas
          sshpass -p "$ATLAS_PASSWORD" ssh $SSH_OPTS "$ATLAS_USER@$ATLAS_HOST" << 'DEPLOY_SCRIPT'
            set -e
            cd /home/claude/agi-hpc

            echo "--- Pulling latest code ---"
            git fetch origin main
            git reset --hard origin/main

            echo "--- Copying dashboard HTML ---"
            cp -f atlas-chat-schematic.html /home/claude/atlas-chat/schematic.html
            cp -f atlas-chat-index.html /home/claude/atlas-chat/index.html 2>/dev/null || true
            cp -f atlas-chat-events.html /home/claude/atlas-chat/events.html 2>/dev/null || true

            echo "--- Installing Python package ---"
            /home/claude/env/bin/pip install -e ".[nats]" --quiet

            echo "--- Restarting RAG server ---"
            # RAG server picks up code changes on restart
            sudo systemctl restart atlas-rag-server || \
              (tmux kill-session -t rag 2>/dev/null; sleep 2; \
               tmux new-session -d -s rag \
                 "CUDA_VISIBLE_DEVICES= /home/claude/env/bin/python3 /home/claude/atlas-rag-server.py \
                 2>&1 | tee /tmp/atlas/rag_server.log")

            echo "--- Restarting telemetry server ---"
            sudo systemctl restart atlas-telemetry || \
              (tmux kill-session -t telemetry 2>/dev/null; sleep 1; \
               tmux new-session -d -s telemetry \
                 "/home/claude/env/bin/python3 /home/claude/agi-hpc/scripts/telemetry_server.py \
                 2>&1 | tee /tmp/atlas/telemetry.log")

            echo "--- Verifying services ---"
            sleep 10
            for port in 8080 8081 8082 8085; do
              if curl -s -o /dev/null -w "%{http_code}" "http://localhost:$port/health" | grep -q "200"; then
                echo "  Port $port: OK"
              else
                echo "  Port $port: WAITING (LLMs take ~30s to load)"
              fi
            done

            echo "=== Deploy complete ==="
          DEPLOY_SCRIPT

      - name: Smoke test
        env:
          ATLAS_HOST: ${{ secrets.ATLAS_HOST }}
          ATLAS_USER: ${{ secrets.ATLAS_USER }}
          ATLAS_PASSWORD: ${{ secrets.ATLAS_PASSWORD }}
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          sleep 15

          # Check RAG server responds
          sshpass -p "$ATLAS_PASSWORD" ssh $SSH_OPTS "$ATLAS_USER@$ATLAS_HOST" \
            'curl -sf http://localhost:8081/api/search-status && echo " -> RAG OK" || echo " -> RAG FAIL"'

          # Check telemetry returns valid JSON
          sshpass -p "$ATLAS_PASSWORD" ssh $SSH_OPTS "$ATLAS_USER@$ATLAS_HOST" \
            'curl -sf http://localhost:8081/api/telemetry | python3 -m json.tool > /dev/null && echo "Telemetry OK" || echo "Telemetry FAIL"'
