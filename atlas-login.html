<!DOCTYPE html>
<html><head><title>Atlas AI - Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0e17;color:#e0e6f0;height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#131a2b;border:1px solid #2a3555;border-radius:16px;padding:40px;text-align:center;max-width:400px;width:90%}

a{display:block;padding:14px 24px;border-radius:10px;text-decoration:none;font-size:15px;font-weight:600;margin:10px 0;transition:all .2s}
.gh{background:#24292f;color:#f6f8fa;border:1px solid #444}
.gh:hover{background:#2d333b}
.go{background:#e53935;color:white;border:1px solid #c62828}
.go:hover{background:#d32f2f}
.foot{margin-top:24px;font-size:11px;color:#7a8ba8;opacity:.6}
</style></head><body>
<div class="card">
<h1>Atlas AI</h1>
<p>Local AI Research Assistant<br>Sign in to continue</p>

<a class="go" href="/oauth2/google">Sign in with Google</a>
