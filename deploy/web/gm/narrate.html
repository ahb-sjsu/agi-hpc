<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>ARTEMIS · Narration Console</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="./gm.css" />
<style>
  #narrate-wrap {
    max-width: 820px;
    margin: 80px auto;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  #narrate-text {
    min-height: 180px;
    padding: 12px 14px;
    font-size: 15px;
    line-height: 1.5;
    background: var(--bg-card-lit);
    color: var(--ink);
    border: 1px solid var(--cyan-dim);
    font-family: var(--font-mono);
    resize: vertical;
    outline: none;
  }
  #narrate-text:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 8px var(--glow);
  }
  #narrate-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  #narrate-status {
    flex: 1;
    color: var(--ink-dim);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  #narrate-status.ok { color: var(--cyan); text-shadow: 0 0 6px var(--glow); }
  #narrate-status.err { color: var(--critical); }
  .quick {
    display: flex; gap: 6px; flex-wrap: wrap;
    padding: 4px 0 10px;
  }
  .quick button {
    background: transparent;
    border: 1px solid var(--cyan-dim);
    color: var(--cyan-dim);
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 4px 10px;
    cursor: pointer;
  }
  .quick button:hover { border-color: var(--cyan); color: var(--cyan); }
</style>
</head>
<body>
  <header id="gm-strip">
    <span id="gm-title">ARTEMIS · NARRATION CONSOLE</span>
    <span id="gm-scene">SILENT GM MODE</span>
    <span id="gm-who">—</span>
  </header>

  <main id="narrate-wrap">
    <div class="quick">
      <button data-snip="The lights flicker for a moment, then steady.">lights flicker</button>
      <button data-snip="You hear a distant, rhythmic thump through the bulkhead.">distant thump</button>
      <button data-snip="A wave of cold passes through the corridor. Nothing is colder than what you feel behind you.">cold presence</button>
      <button data-snip="The handheld in your pocket buzzes. The notification reads simply: LISTEN.">handheld buzz</button>
      <button data-snip="Telemetry reports normal. Nothing is visibly wrong.">tell nothing wrong</button>
      <button data-snip="Stand by. Something is not where I expected it to be.">artemis worried</button>
    </div>
    <textarea id="narrate-text" placeholder="Type the narration ARTEMIS should speak. She'll use her voice, not yours." maxlength="2000"></textarea>
    <div id="narrate-row">
      <span id="narrate-status">IDLE</span>
      <button id="narrate-send" class="btn">SPEAK</button>
    </div>
  </main>

  <script>
  (function () {
    "use strict";
    const qs = new URLSearchParams(location.search);
    const urlToken = qs.get("t") || qs.get("token") || "";
    if (urlToken) sessionStorage.setItem("gm_token", urlToken);
    const TOKEN = sessionStorage.getItem("gm_token") || "";

    function decodeIdentity() {
      if (!TOKEN) return "—";
      try {
        const p = TOKEN.split(".")[1];
        const json = JSON.parse(atob(p.replace(/-/g, "+").replace(/_/g, "/")));
        return json.identity || json.sub || "?";
      } catch (_) { return "?"; }
    }
    document.getElementById("gm-who").textContent = decodeIdentity();

    const text = document.getElementById("narrate-text");
    const status = document.getElementById("narrate-status");
    const send = document.getElementById("narrate-send");

    document.querySelectorAll(".quick button").forEach((b) => {
      b.addEventListener("click", () => {
        const s = b.dataset.snip;
        if (!s) return;
        const cur = text.value.trim();
        text.value = cur ? cur + " " + s : s;
        text.focus();
      });
    });

    async function speak() {
      const body = text.value.trim();
      if (!body) { status.textContent = "EMPTY"; status.className = "err"; return; }
      status.textContent = "SENDING…"; status.className = "";
      send.disabled = true;
      try {
        const r = await fetch("/api/say", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + TOKEN,
          },
          body: JSON.stringify({ text: body }),
        });
        if (r.status === 401) {
          status.textContent = "AUTH REQUIRED (?t=<keeper-jwt>)";
          status.className = "err"; return;
        }
        if (!r.ok) {
          const data = await r.json().catch(() => ({}));
          status.textContent = "FAIL · " + (data.error || ("HTTP " + r.status));
          status.className = "err"; return;
        }
        const data = await r.json();
        status.textContent = "SPOKEN · " + data.chars + " chars";
        status.className = "ok";
        text.value = "";
      } catch (e) {
        status.textContent = "NETWORK · " + e.message;
        status.className = "err";
      } finally {
        send.disabled = false;
      }
    }

    send.addEventListener("click", speak);
    text.addEventListener("keydown", (ev) => {
      if ((ev.metaKey || ev.ctrlKey) && ev.key === "Enter") { ev.preventDefault(); speak(); }
    });
  })();
  </script>
</body>
</html>
