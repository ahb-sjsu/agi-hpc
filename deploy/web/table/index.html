<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>MKS HALYARD · TACTICAL · ARTEMIS</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="./table.css" />
</head>
<body>
  <!-- Fixed in-fiction scene strip along the very top -->
  <header id="scene-strip">
    <span id="scene-left">
      MKS HALYARD · <span id="scene-name">TRANSIT · DAY 184</span>
    </span>
    <span id="scene-right">
      <span id="scene-flags">NOMINAL</span>
    </span>
  </header>

  <div id="app">
    <!-- Avatar card: full-height left column -->
    <section id="card-avatar" class="card">
      <header class="card-header">
        <span class="card-label">ARTEMIS · HANDHELD</span>
        <span id="avatar-status" class="card-status">IDLE</span>
      </header>
      <div id="avatar-stage">
        <video id="artemis-video" autoplay playsinline muted></video>
        <div id="avatar-placeholder" class="avatar-placeholder">
          <div class="pulse"></div>
          <div class="placeholder-text">ESTABLISHING LINK…</div>
        </div>
      </div>
      <div class="avatar-controls">
        <button id="mic-btn" class="btn">MIC : OFF</button>
        <button id="leave-btn" class="btn danger">DISCONNECT</button>
      </div>
    </section>

    <!-- Right column -->
    <div class="right-column">
      <!-- Info / session card -->
      <section id="card-info" class="card">
        <header class="card-header">
          <span class="card-label">SESSION</span>
          <span id="clock">--:--:--</span>
        </header>
        <div class="info-block">
          <div class="info-row">
            <span class="info-k">Room</span>
            <span id="info-room" class="info-v">—</span>
          </div>
          <div class="info-row">
            <span class="info-k">Identity</span>
            <span id="info-identity" class="info-v">—</span>
          </div>
          <div class="info-row">
            <span class="info-k">Uplink</span>
            <span id="info-status" class="info-v warn">OFFLINE</span>
          </div>
        </div>
        <div class="participants-block">
          <div class="block-title">Crew</div>
          <ul id="participants" class="list"></ul>
        </div>
        <div class="log-block">
          <div class="block-title">Event Log</div>
          <ul id="event-log" class="list log"></ul>
        </div>
      </section>

      <!-- Crew stats card — live PC readouts, S1a placeholders;
           wired to Google Sheets in S1b -->
      <section id="card-stats" class="card">
        <header class="card-header">
          <span class="card-label">CREW STATUS</span>
          <span class="card-status">LIVE · PLACEHOLDER</span>
        </header>
        <div id="stats-grid" class="stats-grid">
          <!-- Populated at runtime by table.js with placeholder data. -->
        </div>
      </section>

      <!-- Artifacts card -->
      <section id="card-artifacts" class="card">
        <header class="card-header">
          <span class="card-label">ARTIFACTS</span>
          <span class="card-status">SESSION HANDOUTS</span>
        </header>
        <ul id="artifact-list" class="list">
          <li class="loading">loading manifest…</li>
        </ul>
      </section>
    </div>
  </div>

  <script src="./vendor/livekit-client.umd.min.js"></script>
  <script src="./table.js"></script>
</body>
</html>
